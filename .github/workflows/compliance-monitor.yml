name: Continuous Compliance Monitor

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  soc2-iac-scan:
    name: SOC 2 Infrastructure Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Checkov SOC 2 Audit
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: Compliance/Infrastructure
          framework: terraform
          # SOC 2 relevant checks: EBS encryption, S3 public access, MFA, etc.
          quiet: true
          soft_fail: false # Blocks non-compliant PRs
          download_external_modules: true
          # 🛡️ Sentinel: Ensuring we run with a secure, pinned version.

  security-audit:
    name: SOC 2 Script Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Identity Audit (Dry Run)
        run: python Compliance/Scripts/identity_audit.py --output findings.json
